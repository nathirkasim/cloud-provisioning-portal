name: Build & Deploy

on:
  push:
    branches: [feature1]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 954930678370.dkr.ecr.us-east-1.amazonaws.com
  BACKEND_REPO: cloud-portal-backend
  FRONTEND_REPO: cloud-portal-frontend
  ASG_NAME: cloud-portal-asg

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. AWS Credentials ──────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── 3. ECR Login ─────────────────────────────────────────────────────
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # ── 4. Set image tag (short SHA) ─────────────────────────────────────
      - name: Set image tag
        id: tag
        run: echo "TAG=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      # ── 5. Build & push backend image ────────────────────────────────────
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}:${{ steps.tag.outputs.TAG }}
            ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}:latest

      # ── 6. Build & push frontend image ───────────────────────────────────
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:${{ steps.tag.outputs.TAG }}
            ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:latest

      # ── 7. Resolve instance ID from ASG ──────────────────────────────────
      - name: Get EC2 instance ID from ASG
        id: get-instance
        run: |
          INSTANCE_ID=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "${{ env.ASG_NAME }}" \
            --query "AutoScalingGroups[0].Instances[?HealthStatus=='Healthy'] | [0].InstanceId" \
            --output text)

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "ERROR: No healthy instance found in ASG ${{ env.ASG_NAME }}"
            exit 1
          fi

          echo "Found instance: $INSTANCE_ID"
          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_OUTPUT

      # ── 8. Deploy via SSM ─────────────────────────────────────────────────
      - name: Deploy via SSM
        run: |
          INSTANCE_ID="${{ steps.get-instance.outputs.INSTANCE_ID }}"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${GITHUB_SHA::8}" \
            --parameters 'commands=[
              "#!/bin/bash",
              "set -e",
              "export HOME=/root",
              "git config --global --add safe.directory /home/ubuntu/app",
              "cd /home/ubuntu/app",
              "git fetch origin feature1",
              "git reset --hard origin/feature1",
              "echo === Logging into ECR ===",
              "aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 954930678370.dkr.ecr.us-east-1.amazonaws.com",
              "echo === Pulling new images ===",
              "docker compose -f docker-compose.yaml -f docker-compose.override.yml pull backend frontend worker beat",
              "echo === Restarting app containers ===",
              "docker compose -f docker-compose.yaml -f docker-compose.override.yml up -d --no-deps backend frontend worker beat",
              "sleep 20",
              "docker compose -f docker-compose.yaml -f docker-compose.override.yml ps",
              "echo === Deploy complete ==="
            ]' \
            --timeout-seconds 600 \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"
          echo "COMMAND_ID=$COMMAND_ID" >> $GITHUB_ENV

      # ── 9. Poll until done (40 × 15s = 10 min max) ───────────────────────
      - name: Wait for deploy to complete
        run: |
          INSTANCE_ID="${{ steps.get-instance.outputs.INSTANCE_ID }}"
          echo "Polling SSM command $COMMAND_ID..."

          for i in $(seq 1 40); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" --output text 2>/dev/null || echo "Pending")

            echo "Attempt $i/40 — Status: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "=== Deploy Output ==="
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardOutputContent" --output text
              echo "Deploy succeeded."
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "=== Deploy Output ==="
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "{Out: StandardOutputContent, Err: StandardErrorContent}" --output json
              echo "ERROR: Deploy failed with status: $STATUS"
              exit 1
            fi

            sleep 15
          done

          echo "ERROR: Timed out waiting for deploy (10 min)"
          exit 1
