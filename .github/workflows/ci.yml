name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Check imports
        run: |
          cd backend
          python3 -c "from app.main import app; print('Backend imports OK')"
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/cloud_portal
          SECRET_KEY: test-secret-key-for-ci
          ALGORITHM: HS256
          GMAIL_USER: test@test.com
          GMAIL_APP_PASSWORD: testpassword
          ALLOWED_ORIGINS: http://localhost:5173

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Build
        run: |
          cd frontend
          npm run build
