services:
  db:
    image: postgres:15
    container_name: portal_db
    environment:
      POSTGRES_DB: cloud_portal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: portal_redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: portal_backend
    command: /bin/bash start.sh
    volumes:
      - ./backend:/app
      - ~/.aws:/root/.aws:ro
    
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/cloud_portal
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  worker:
    build: ./backend
    container_name: portal_worker
    command: bash -c "cd /app/terraform && terraform init -reconfigure && cd /app && celery -A app.celery_app worker --loglevel=info"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/cloud_portal
      - REDIS_URL=redis://redis:6379/0
      - AWS_DEFAULT_REGION=ap-south-1
    volumes:
      - ./backend:/app
      - ~/.aws:/root/.aws:ro
    depends_on:
      - db
      - redis

  beat:
    build: ./backend
    container_name: portal_beat
    command: celery -A app.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/cloud_portal
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

  frontend:
    build: ./frontend
    container_name: portal_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
